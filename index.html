<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Observaciones - CORREGIDO</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #f0f2f5;
        }

        h1 {
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 15px;
        }

        .observacion {
            background: white;
            border: 1px solid #e1e8ed;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .observacion:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }

        .obs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .obs-titulo {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
        }

        .obs-descripcion {
            color: #555;
            margin: 10px 0 15px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            border-left: 4px solid #3498db;
        }

        /* ===== CHECKBOX CONFORME ===== */
        .conforme-toggle {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 2px solid #e1e8ed;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .conforme-toggle:hover {
            border-color: #3498db;
            background: #f0f7ff;
        }

        .conforme-toggle input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #27ae60;
        }

        .conforme-toggle label {
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            color: #2c3e50;
            user-select: none;
        }

        .conforme-toggle .estado-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .badge-conforme {
            background: #27ae60;
            color: white;
        }

        .badge-no-conforme {
            background: #e74c3c;
            color: white;
        }

        .badge-pendiente {
            background: #f39c12;
            color: white;
        }

        .conforme-toggle.conforme-activo {
            border-color: #27ae60;
            background: #eafaf1;
        }

        .conforme-toggle.no-conforme-activo {
            border-color: #e74c3c;
            background: #fdedec;
        }

        /* ===== BOTONES DE ESTADO ===== */
        .acciones {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn-estado {
            padding: 8px 16px;
            border: 2px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-estado:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .btn-estado.activo {
            border-color: #3498db;
            background: #ebf5fb;
        }

        .btn-conforme.activo {
            border-color: #27ae60;
            background: #eafaf1;
            color: #27ae60;
        }

        .btn-no-conforme.activo {
            border-color: #e74c3c;
            background: #fdedec;
            color: #e74c3c;
        }

        .btn-subsanado.activo {
            border-color: #f39c12;
            background: #fef9e7;
            color: #f39c12;
        }

        .fecha {
            color: #7f8c8d;
            font-size: 13px;
            margin-top: 10px;
        }

        /* ===== TOAST NOTIFICACIÓN ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2c3e50;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateY(100px);
            transition: all 0.4s ease;
            z-index: 1000;
            font-weight: 500;
        }

        .toast.mostrar {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.exito {
            background: #27ae60;
        }
    </style>
</head>
<body>
    <h1>📋 Gestión de Observaciones - CORREGIDO</h1>

    <!-- OBSERVACIÓN 1 -->
    <div class="observacion" id="obs-1">
        <div class="obs-header">
            <span class="obs-titulo">🔍 Observación #1</span>
            <span class="fecha">2/7/2023</span>
        </div>
        <div class="obs-descripcion">
            <strong>Descripción:</strong> Las tuberías irán enterradas o dentro del falso piso
        </div>

        <!-- CHECKBOX CONFORME (Principal) -->
        <div class="conforme-toggle" id="toggle-1" onclick="toggleConforme(1)">
            <input type="checkbox" id="check-1" onchange="event.stopPropagation(); toggleConforme(1)">
            <label for="check-1">✅ Marcar como CONFORME</label>
            <span class="estado-badge" id="badge-1">PENDIENTE</span>
        </div>

        <!-- BOTONES DE ESTADO RÁPIDO -->
        <div class="acciones">
            <button class="btn-estado btn-conforme" onclick="cambiarEstado(1, 'CONFORME')">✔ CONFORME</button>
            <button class="btn-estado btn-no-conforme" onclick="cambiarEstado(1, 'NO CONFORME')">✘ NO CONFORME</button>
            <button class="btn-estado btn-subsanado" onclick="cambiarEstado(1, 'SUBSANADO')">🔄 SUBSANADO</button>
        </div>
    </div>

    <!-- TOAST NOTIFICACIÓN -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // DATOS DE LAS OBSERVACIONES
        // ============================================
        const observaciones = {
            1: {
                id: 1,
                descripcion: 'Las tuberías irán enterradas o dentro del falso piso',
                estado: 'PENDIENTE' // PENDIENTE, CONFORME, NO CONFORME, SUBSANADO
            }
        };

        // ============================================
        // FUNCIONES PRINCIPALES - CORREGIDAS
        // ============================================

        // 🔹 Función que se ejecuta al hacer clic en el checkbox CONFORME
        function toggleConforme(id) {
            const obs = observaciones[id];
            const checkbox = document.getElementById(`check-${id}`);
            
            // Si el checkbox está marcado → poner CONFORME
            if (checkbox.checked) {
                cambiarEstado(id, 'CONFORME');
            } else {
                // Si se desmarca → volver a PENDIENTE
                cambiarEstado(id, 'PENDIENTE');
            }
        }

        // 🔹 Función principal para cambiar el estado - ¡CORREGIDA!
        function cambiarEstado(id, nuevoEstado) {
            const obs = observaciones[id];
            const estadoAnterior = obs.estado;
            
            // Actualizar el objeto
            obs.estado = nuevoEstado;
            
            // Actualizar la interfaz
            actualizarUI(id, nuevoEstado);
            
            // Mostrar notificación
            mostrarToast(`✅ Estado cambiado: ${estadoAnterior} → ${nuevoEstado}`);
            
            // ⭐ IMPORTANTE: Guardar en localStorage para que persista
            localStorage.setItem('observaciones', JSON.stringify(observaciones));
        }

        // 🔹 Actualizar toda la UI de una observación
        function actualizarUI(id, estado) {
            const checkbox = document.getElementById(`check-${id}`);
            const badge = document.getElementById(`badge-${id}`);
            const toggle = document.getElementById(`toggle-${id}`);
            
            // Actualizar badge
            badge.textContent = estado;
            badge.className = 'estado-badge';
            
            if (estado === 'CONFORME') {
                badge.classList.add('badge-conforme');
                toggle.className = 'conforme-toggle conforme-activo';
                checkbox.checked = true;
            } else if (estado === 'NO CONFORME') {
                badge.classList.add('badge-no-conforme');
                toggle.className = 'conforme-toggle no-conforme-activo';
                checkbox.checked = false;
            } else if (estado === 'SUBSANADO') {
                badge.classList.add('badge-pendiente');
                toggle.className = 'conforme-toggle';
                checkbox.checked = false;
            } else { // PENDIENTE o cualquier otro
                badge.classList.add('badge-pendiente');
                toggle.className = 'conforme-toggle';
                checkbox.checked = false;
            }
            
            // Actualizar botones de estado
            actualizarBotones(id, estado);
        }

        // 🔹 Actualizar botones de estado (visual)
        function actualizarBotones(id, estadoActual) {
            const observacion = document.getElementById(`obs-${id}`);
            const botones = observacion.querySelectorAll('.btn-estado');
            
            botones.forEach(btn => {
                btn.classList.remove('activo');
                const texto = btn.textContent.trim();
                
                if (texto.includes('CONFORME') && estadoActual === 'CONFORME') {
                    btn.classList.add('activo');
                } else if (texto.includes('NO CONFORME') && estadoActual === 'NO CONFORME') {
                    btn.classList.add('activo');
                } else if (texto.includes('SUBSANADO') && estadoActual === 'SUBSANADO') {
                    btn.classList.add('activo');
                }
            });
        }

        // 🔹 Mostrar toast de notificación
        function mostrarToast(mensaje) {
            const toast = document.getElementById('toast');
            toast.textContent = mensaje;
            toast.className = 'toast exito mostrar';
            
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        // ============================================
        // CARGAR DATOS GUARDADOS
        // ============================================
        function cargarDatos() {
            const guardado = localStorage.getItem('observaciones');
            if (guardado) {
                try {
                    const datos = JSON.parse(guardado);
                    Object.assign(observaciones, datos);
                } catch (e) {
                    console.log('Error al cargar datos:', e);
                }
            }
        }

        // ============================================
        // INICIALIZAR
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            cargarDatos();
            actualizarUI(1, observaciones[1].estado);
            console.log('✅ Sistema CORREGIDO cargado correctamente');
            console.log('📌 Estado actual:', observaciones[1].estado);
        });
    </script>
</body>
</html>
